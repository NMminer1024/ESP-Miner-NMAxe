<ng-container *ngIf="form != null">
  <form [formGroup]="form">
    <!-- <ng-container *ngIf="!devToolsOpen && ASICModel == eASICModel.BM1366">

    </ng-container> -->

    <!-- Screen Brightness -->
    <div class="field grid p-fluid">
      <label class="col-12 mb-2 md:col-3 md:mb-0" htmlFor="brightness">Screen Brightness</label>
      <div class="col-12 md:col-9">
        <div class="p-grid">
          <div class="p-col-8">
            <p-slider formControlName="brightness" [(ngModel)]="form.controls['brightness'].value" [min]="1" [max]="100"></p-slider>
          </div>
          <div class="p-col-4">
            <label>{{ form.controls['brightness'].value }}%</label>
          </div>
        </div>
      </div>
    </div>

    <!-- ASIC Fan Control -->
    <div class="field grid p-fluid">
      <div class="col-12 mb-2 md:col-3 md:mb-0 fan-auto-label">
        <p-checkbox name="autoasicfanspeed" formControlName="autoasicfanspeed" inputId="autoasicfanspeed" [binary]="true"></p-checkbox>
        <label for="autoasicfanspeed" class="fan-toggle-label">Auto ASIC Fan</label>
      </div>
      <div class="col-12 md:col-9">
        <ng-container *ngIf="form.controls['autoasicfanspeed'].value == true">
          <div class="p-grid">
            <div class="p-col-8">
              <p-slider
                formControlName="asictargettemp"
                [(ngModel)]="form.controls['asictargettemp'].value"
                [min]="asicTempMin"
                [max]="asicTempMax"
                [step]="1"
                [ngClass]="getTemperatureSliderClass()">
              </p-slider>
            </div>
            <div class="p-col-4">
              <label>Target ASIC: {{ form.controls['asictargettemp'].value }}°C</label>
            </div>
          </div>
        </ng-container>
        <ng-container *ngIf="form.controls['autoasicfanspeed'].value != true">
          <div class="p-grid">
            <div class="p-col-8">
              <p-slider formControlName="asicfanspeed" [(ngModel)]="form.controls['asicfanspeed'].value"></p-slider>
            </div>
            <div class="p-col-4">
              <label>ASIC Fan: {{ form.controls['asicfanspeed'].value }}%</label>
            </div>
          </div>
        </ng-container>
      </div>
    </div>

    <!-- Vcore Fan Control (NMQAxe++ dual fan only) -->
    <div *ngIf="hasDualFan" class="field grid p-fluid">
      <div class="col-12 mb-2 md:col-3 md:mb-0 fan-auto-label">
        <p-checkbox name="autovcorefanspeed" formControlName="autovcorefanspeed" inputId="autovcorefanspeed" [binary]="true"></p-checkbox>
        <label for="autovcorefanspeed" class="fan-toggle-label">Auto Vcore Fan</label>
      </div>
      <div class="col-12 md:col-9">
        <ng-container *ngIf="form.controls['autovcorefanspeed'].value == true">
          <div class="p-grid">
            <div class="p-col-8">
              <p-slider
                formControlName="vcoretargettemp"
                [(ngModel)]="form.controls['vcoretargettemp'].value"
                [min]="vcoreTempMin"
                [max]="vcoreTempMax"
                [step]="1"
                [ngClass]="getVcoreTemperatureSliderClass()">
              </p-slider>
            </div>
            <div class="p-col-4">
              <label>Target Vcore: {{ form.controls['vcoretargettemp'].value }}°C</label>
            </div>
          </div>
        </ng-container>
        <ng-container *ngIf="form.controls['autovcorefanspeed'].value != true">
          <div class="p-grid">
            <div class="p-col-8">
              <p-slider formControlName="vcorefanspeed" [(ngModel)]="form.controls['vcorefanspeed'].value"></p-slider>
            </div>
            <div class="p-col-4">
              <label>Vcore Fan: {{ form.controls['vcorefanspeed'].value }}%</label>
            </div>
          </div>
        </ng-container>
      </div>
    </div>

    <!-- Screen Saver: timer dropdown + GIF upload (same row 8:2) -->
    <div class="field grid p-fluid">
      <label class="col-12 mb-2 md:col-3 md:mb-0" htmlFor="screensaverTimeout">Screen Saver</label>
      <div class="col-12 md:col-9">
        <div style="display:flex; align-items:center; gap:8px;">
          <div style="flex:8; min-width:0;">
            <p-dropdown id="screensaverTimeout"
                        formControlName="screensaverTimeout"
                        [options]="screensaverOptions"
                        optionLabel="label"
                        optionValue="value"
                        [style]="{'width':'100%'}">
            </p-dropdown>
          </div>
          <div style="flex:2; min-width:0;">
            <input #screensaverInput type="file" accept=".gif" style="display:none"
                   (change)="onScreensaverFileSelected($event)" />
            <button pButton type="button" label="GIF"
                    icon="pi pi-image"
                    class="p-button-secondary"
                    [disabled]="screensaverUploading"
                    (click)="screensaverInput.click()"
                    style="width:100%;">
            </button>
          </div>
        </div>
        <small style="color:#aaaaaa; display:block; margin-top:4px;">
          <ng-container *ngIf="screensaverUploading">
            <span style="color:#4CAF50; margin-right:6px;">
              Uploading {{ screensaverProgress }}%
              <ng-container *ngIf="screensaverProgress >= 100 && screensaverDeviceProgress < 100">
                &nbsp;· Writing {{ screensaverDeviceProgress }}%
              </ng-container>
            </span>
          </ng-container>
          {{ screensaverResolutionHint }}<br/>
          <span style="color:#cc9933;">&#9888; Custom GIF will be lost when updating SPIFFS.bin. Please back up your GIF file offline.</span>
        </small>
      </div>
    </div>

    <!-- Checkbox Options -->
    <div class="col-12" style="display: flex; flex-wrap: wrap; gap: 10px;">
      <div class="col-12 md:col-4" style="flex: 1;">
        <div class="field-checkbox">
          <p-checkbox name="flipscreen" formControlName="flipscreen" inputId="flipscreen" [binary]="true"></p-checkbox>
          <label for="flipscreen">Flip Screen</label>
        </div>
      </div>
      <div class="col-12 md:col-4" style="flex: 1;">
        <div class="field-checkbox">
          <p-checkbox name="ledindicator" formControlName="ledindicator" inputId="ledindicator"
                      [binary]="true"></p-checkbox>
          <label for="ledindicator">LED Indicator</label>
        </div>
      </div>
      <div class="col-12 md:col-4" style="flex: 1;">
        <div class="field-checkbox">
          <p-checkbox name="autoscreen" formControlName="autoscreen" inputId="autoscreen"
                      [binary]="true"></p-checkbox>
          <label for="autoscreen">Auto Scroll</label>
        </div>
      </div>
    </div>

    <!-- Save Button -->
    <div class="mt-2">
      <button pButton [disabled]="form.invalid" (click)="updateSystem()"
              class="btn btn-primary mr-2">Save
      </button>
      <b style="line-height: 34px;">You must restart this device after saving for changes to take effect.</b>
    </div>
  </form>
</ng-container>
