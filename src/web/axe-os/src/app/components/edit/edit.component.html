<ng-container *ngIf="form != null">
  <form [formGroup]="form">
    <!-- Primary Pool Section -->
    <div class="mining-pool-section primary-pool">
      <div class="pool-header">
        <span class="pool-icon">🥇</span>
        <h4 class="pool-title">Primary Pool</h4>
        <small class="pool-description">This pool is used on miner bootup</small>
      </div>
      
      <div class="field grid p-fluid">
        <label htmlFor="stratumUser1" class="col-12 mb-2 md:col-2 md:mb-0">Stratum USER:</label>
        <div class="col-12 md:col-10">
          <input pInputText id="stratumUser1" formControlName="stratumUser1" type="text" />
        </div>
      </div>

      <div class="field grid p-fluid">
        <label htmlFor="stratumURL1" class="col-12 mb-2 md:col-2 md:mb-0">Stratum URL:</label>
        <div class="col-12 md:col-10">
          <input pInputText id="stratumURL1" type="text" formControlName="stratumURL1" />
        </div>
      </div>

      <div class="field grid p-fluid">
        <label htmlFor="stratumPassword1" class="col-12 mb-2 md:col-2 md:mb-0">Stratum PWD:</label>
        <div class="col-12 md:col-10">
          <input pInputText id="stratumPassword1" formControlName="stratumPassword1" type="text" />
        </div>
      </div>
    </div>

    <!-- Backup Pool Section -->
    <div class="mining-pool-section backup-pool">
      <div class="pool-header">
        <span class="pool-icon">🥈</span>
        <h4 class="pool-title">Backup Pool</h4>
        <small class="pool-description">This pool is used if the primary pool fails</small>
      </div>
      
      <div class="field grid p-fluid">
        <label htmlFor="stratumUser2" class="col-12 mb-2 md:col-2 md:mb-0">Stratum USER:</label>
        <div class="col-12 md:col-10">
          <input pInputText id="stratumUser2" formControlName="stratumUser2" type="text" />
        </div>
      </div>

      <div class="field grid p-fluid">
        <label htmlFor="stratumURL2" class="col-12 mb-2 md:col-2 md:mb-0">Stratum URL:</label>
        <div class="col-12 md:col-10">
          <input pInputText id="stratumURL2" type="text" formControlName="stratumURL2" />
        </div>
      </div>

      <div class="field grid p-fluid">
        <label htmlFor="stratumPassword2" class="col-12 mb-2 md:col-2 md:mb-0">Stratum PWD:</label>
        <div class="col-12 md:col-10">
          <input pInputText id="stratumPassword2" formControlName="stratumPassword2" type="text" />
        </div>
      </div>
    </div>

    <ng-container *ngIf="!devToolsOpen && (ASICModel == eASICModel.BM1366 || ASICModel == eASICModel.BM1370)">
      <div class="field grid p-fluid">
        <label class="col-12 mb-2 md:col-2 md:mb-0" htmlFor="frequency">OverClock(MHz)</label>
        <div class="col-12 md:col-10">
          <p-dropdown [options]="DropdownFrequency" optionLabel="name" optionValue="value"
                      formControlName="frequency"></p-dropdown>
        </div>
      </div>

      <div class="field grid p-fluid">
        <label class="col-12 mb-2 md:col-2 md:mb-0" htmlFor="coreVoltage">Vcore(mV)</label>
        <p-dropdown class="col-12 md:col-10" [options]="CoreVoltage" optionLabel="name"
                    optionValue="value" formControlName="coreVoltage"></p-dropdown>
      </div>
    </ng-container>

    <ng-container *ngIf="devToolsOpen === true">

      <div class="field grid p-fluid">
        <label htmlFor="frequency" class="col-12 mb-2 md:col-2 md:mb-0">OverClock(MHz)</label>
        <div class="col-12 md:col-10">
          <input pInputText id="frequency" formControlName="frequency" type="number" />
        </div>
      </div>

      <div class="field grid p-fluid">
        <label htmlFor="coreVoltage" class="col-12 mb-2 md:col-2 md:mb-0">Vcore(mV)</label>
        <div class="col-12 md:col-10">
          <input pInputText id="coreVoltage" formControlName="coreVoltage" type="number" />
        </div>
      </div>

    </ng-container>


    <!-- <div class="col-12 md:col-4" *ngIf="form.get('overheat_mode')?.value === 1">
      <div class="field-checkbox">
        <p-checkbox name="overheat_mode" formControlName="overheat_mode" inputId="overheat_mode"
                    [binary]="true"></p-checkbox>
        <label for="overheat_mode">Disable Overheat Mode. Make sure to reset Frequency and Voltage</label>
      </div>
    </div> -->

    <div class="mt-2">
      <button pButton [disabled]="form.invalid" (click)="updateSystem()"
              class="btn btn-primary mr-2">Save
      </button>
      <b style="line-height: 34px;">Frequency and Vcore apply in real time after Save; pool changes require reconnect or restart.</b>
    </div>


  </form>
</ng-container>
