<div class="help-backdrop" *ngIf="visible && content" (click)="close()">
  <div class="help-card" (click)="$event.stopPropagation()" role="dialog" aria-modal="true">

    <!-- Header -->
    <div class="help-header">
      <i [class]="content.icon + ' help-header-icon'"></i>
      <span class="help-title">{{ content.title }}</span>
      <button class="help-close-btn" (click)="close()" aria-label="Close">
        <i class="pi pi-times"></i>
      </button>
    </div>

    <!-- Scrollable body -->
    <div class="help-body">
      <ng-container *ngFor="let section of content.sections">
        <h4 class="help-section-heading" *ngIf="section.heading">{{ section.heading }}</h4>
        <p class="help-section-body">{{ section.body }}</p>
      </ng-container>
      <div class="help-callout" *ngIf="content.callout">{{ content.callout }}</div>
    </div>

    <!-- Footer -->
    <div class="help-footer">
      <button class="help-ok-btn" (click)="close()">
        <i class="pi pi-check"></i>&nbsp;Got it
      </button>
    </div>

  </div>
</div>
