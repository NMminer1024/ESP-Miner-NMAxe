<div class="monitor-container">
  <div class="card modern-card">
    <!-- Top control bar -->
    <div class="top-controls">
      <div class="status-info">
        <span class="status-badge" [ngClass]="getStatusBadgeClass()">
          {{ getStatusText() }}
        </span>
        <span class="realtime-info" *ngIf="!isLoading">
          <app-circular-countdown 
            [countdown]="realtimeCountdown" 
            [maxValue]="realtimeInterval">
          </app-circular-countdown>
        </span>
      </div>
      
      <div class="control-actions">
        <div class="dropdown-container">
          <select 
            [(ngModel)]="selectedTimeRange"
            (change)="onTimeRangeChange()"
            class="time-selector">
            <option *ngFor="let range of timeRanges" [value]="range.value">
              {{ range.label }}
            </option>
          </select>
          
          <select 
            [(ngModel)]="sampleInterval"
            (change)="onSampleIntervalChange()"
            class="sample-selector">
            <option value="1">High detail</option>
            <option value="5">Normal</option>
            <option value="10">Fast</option>
            <option value="20">Low detail</option>
          </select>
        </div>
        
        <button 
          class="export-button"
          (click)="exportData()"
          [disabled]="!historyData.length || isLoading"
          title="Export CSV Data">
          <span class="export-icon">💾</span>
          <span class="export-text">Export</span>
        </button>
      </div>
    </div>
    
    <div class="card-content">
      <!-- 水平字段选择器 -->
      <div class="metrics-selector">
        <div class="metrics-checkboxes">
          <label *ngFor="let field of fieldOptions" class="metric-checkbox">
            <input 
              type="checkbox" 
              [(ngModel)]="field.selected"
              (change)="onFieldSelectionChange()">
            <span class="checkbox-custom" [style.--accent-color]="field.color">
              <span class="checkmark">✓</span>
            </span>
            <span class="metric-label">{{ field.label }}</span>
          </label>
        </div>
      </div>
      
      <!-- 图表容器 - 占据主要空间 -->
      <div class="chart-container-main">
        <!-- Loading状态 - 在图表区域内显示 -->
        <div *ngIf="isLoading || historyData.length === 0" class="loading-container">
          <div class="loading-spinner"></div>
          <p *ngIf="isLoading">Loading monitoring data...</p>
          <p *ngIf="!isLoading && historyData.length === 0">Waiting for data...</p>
        </div>
        
        <!-- 图表Canvas - 始终存在但可能隐藏 -->
        <canvas #chartCanvas 
                class="chart-canvas"
                [style.display]="isLoading || historyData.length === 0 ? 'none' : 'block'">
        </canvas>
      </div>
    </div>
  </div>
</div>
