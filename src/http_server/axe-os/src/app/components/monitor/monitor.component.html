<div class="monitor-container">
  <div class="card modern-card">
    <!-- Top control bar -->
    <div class="top-controls">
      <div class="status-info">
        <span class="realtime-info" *ngIf="!isLoading">
          <app-circular-countdown 
            [countdown]="realtimeCountdown" 
            [maxValue]="realtimeInterval">
          </app-circular-countdown>
        </span>
      </div>
      
      <div class="control-actions">
        <div class="dropdown-container">
          <select 
            [(ngModel)]="selectedTimeRange"
            (change)="onTimeRangeChange()"
            class="time-selector">
            <option *ngFor="let range of timeRanges" [value]="range.value">
              {{ range.label }}
            </option>
          </select>
          
          <select 
            [(ngModel)]="sampleInterval"
            (change)="onSampleIntervalChange()"
            class="sample-selector">
            <option value="1">High detail</option>
            <option value="5">Normal</option>
            <option value="10">Fast</option>
            <option value="20">Low detail</option>
          </select>

          <!-- 桌面端使用 PrimeNG MultiSelect -->
          <p-multiSelect 
            *ngIf="!isMobile"
            [options]="fieldOptions" 
            [(ngModel)]="selectedFields"
            optionLabel="label"
            optionValue="value"
            (onChange)="onFieldSelectionChange()"
            placeholder="Select Metrics"
            class="metrics-multiselect"
            [showToggleAll]="false"
            [maxSelectedLabels]="2"
            selectedItemsLabel="{0} metrics"
            [scrollHeight]="'auto'"
            [virtualScroll]="false"
            [filter]="false"
            [showHeader]="false">
          </p-multiSelect>

          <!-- 移动端使用底部滑出选择器 -->
          <button 
            *ngIf="isMobile"
            class="mobile-metrics-selector"
            (click)="showMobileMetricsSelector()"
            [class.has-selection]="selectedFields.length > 0">
            <span class="selector-text">
              {{ getMobileDisplayText() }}
            </span>
            <i class="pi pi-angle-down selector-icon"></i>
          </button>
        </div>
        
        <button 
          class="export-button"
          (click)="exportData()"
          [disabled]="!historyData.length || isLoading"
          title="Export CSV Data">
          <span class="export-icon">💾</span>
        </button>
      </div>
    </div>
    
    <div class="card-content">
      <!-- 图表容器 - 占据主要空间 -->
      <div class="chart-container-main">
        <!-- Loading状态 - 在图表区域内显示 -->
        <div *ngIf="isLoading || historyData.length === 0" class="loading-container">
          <div class="loading-spinner"></div>
          <p *ngIf="isLoading">Loading monitoring data...</p>
          <p *ngIf="!isLoading && historyData.length === 0">Waiting for data...</p>
        </div>
        
        <!-- 图表Canvas - 始终存在但可能隐藏 -->
        <canvas #chartCanvas 
                class="chart-canvas"
                [style.display]="isLoading || historyData.length === 0 ? 'none' : 'block'">
        </canvas>
      </div>
    </div>
  </div>
  
  <!-- 移动端底部滑出指标选择器 -->
  <app-bottom-sheet-selector
    [(isVisible)]="showMobileSelector"
    [config]="mobileMetricsConfig"
    [selectedValues]="selectedFields"
    (multiSelectionChange)="onMobileMetricsChange($event)"
    (close)="onMobileSelectorClose()">
  </app-bottom-sheet-selector>
</div>
