<div class="lucky-chart-container">
  <div class="chart-header">
    <h3 class="chart-title">
      Lucky Statistics
    </h3>
    <div class="chart-controls">
      <div class="chart-info" *ngIf="!isLoading">
        <span class="shares-count">{{ dataSize }} shares</span>
      </div>
      <div class="loading-indicator" *ngIf="isLoading">
        <span class="loading-spinner">⏳</span>
        Loading...
      </div>
    </div>
  </div>
  
  <div class="chart-content">
    <div class="chart-wrapper" [class.loading]="isLoading">
      <canvas #chartCanvas></canvas>
      
      <!-- Loading overlay -->
      <div class="loading-overlay" *ngIf="isLoading">
        <div class="loading-content">
          <div class="spinner"></div>
          <p>Loading lucky data...</p>
        </div>
      </div>
    </div>
    
    <!-- Chart legend and info -->
    <div class="chart-footer">
      <div class="chart-description">
        <p>
          Shows share and network difficulty over time on logarithmic scale. 
          Gaps are filled to maintain visual continuity.
        </p>
      </div>
    </div>
  </div>
</div>
