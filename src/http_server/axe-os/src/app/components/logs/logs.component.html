  <div class="col-12">
    <div class="logs-container">
      <div class="logs-header">
        <span class="logs-icon">📋</span>
        <h2>Realtime Logs</h2>
        <div class="logs-controls">
          <button pButton (click)="toggleLogs()" 
                  class="p-button-rounded p-button-outlined" 
                  [label]="showLogs ? 'Hide Logs' : 'Show Logs'">
          </button>
          <button pButton 
                  *ngIf="showLogs"
                  (click)="stopScroll = !stopScroll"
                  class="p-button-rounded p-button-outlined"
                  [label]="stopScroll ? 'Start Scrolling' : 'Stop Scrolling'">
          </button>
        </div>
      </div>

      <div *ngIf="showLogs" id="logs" #scrollContainer>
        <pre *ngFor="let log of logs" class="log-entry">₿ {{ log }}</pre>
      </div>
    </div>
  </div>


</div>
