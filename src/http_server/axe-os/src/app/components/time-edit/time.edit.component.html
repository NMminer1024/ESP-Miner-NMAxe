<ng-container *ngIf="form != null">
    <form [formGroup]="form">

        <div class="field grid p-fluid">
            <label htmlFor="timezone" class="col-12 mb-2 md:col-2 md:mb-0">
              TimeZone:
              <span class="timezone-help-icon"
                    pTooltip="This timezone value only takes effect when the internal automatic timezone detection fails"
                    tooltipPosition="top"
                    style="margin-left: 5px; cursor: help; color: #888; font-size: 14px;">
                ❓
              </span>
            </label>
            <div class="col-12 md:col-10">
                <input pInputText id="timezone" type="number" formControlName="timezone"
                       placeholder="Enter timezone offset (e.g., 8 for UTC+8)"
                       min="-12" max="14" step="1" />
            </div>
        </div>

        <div class="field grid p-fluid">
            <label htmlFor="timeFormat" class="col-12 mb-2 md:col-2 md:mb-0">Time Format:</label>
            <div class="col-12 md:col-10">
                <p-dropdown id="timeFormat" formControlName="timeFormat"
                            [options]="timeFormatOptions"
                            optionLabel="label"
                            optionValue="value"
                            placeholder="Select time format">
                </p-dropdown>
            </div>
        </div>

        <div class="field grid p-fluid">
            <label htmlFor="dateFormat" class="col-12 mb-2 md:col-2 md:mb-0">Date Format:</label>
            <div class="col-12 md:col-10">
                <p-dropdown id="dateFormat" formControlName="dateFormat"
                            [options]="dateFormatOptions"
                            optionLabel="label"
                            optionValue="value"
                            placeholder="Select date format">
                </p-dropdown>
            </div>
        </div>

        <div class="mt-2">
            <button pButton [disabled]="form.invalid || !hasFormChanged()" (click)="updateSystem()"
                class="btn btn-primary mr-2"
                [pTooltip]="getButtonTooltip()"
                tooltipPosition="top">Save</button>
            <b style="line-height: 34px;">You must restart this device after saving for changes to take effect.</b>
        </div>
    </form>
</ng-container>
