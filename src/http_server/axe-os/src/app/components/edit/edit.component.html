<ng-container *ngIf="form != null">
  <form [formGroup]="form">
    <div class="field grid p-fluid">
      <label class="col-12 mb-2 md:col-2 md:mb-0" htmlFor="Coin">Mining Coin:</label>
      <p-dropdown class="col-12 md:col-10" [options]="Coin" optionLabel="name"
                  optionValue="value" formControlName="coin"></p-dropdown>
    </div>
    <div class="field grid p-fluid">
      <label htmlFor="stratumUser" class="col-12 mb-2 md:col-2 md:mb-0">Stratum User:</label>
      <div class="col-12 md:col-10">
        <input pInputText id="stratumUser" formControlName="stratumUser" type="text" />
      </div>
    </div>






    <div class="field grid p-fluid">
      <label htmlFor="stratumURL1" class="col-12 mb-2 md:col-2 md:mb-0">Stratum URL ( Primary ):</label>
      <div class="col-12 md:col-10">
        <input pInputText id="stratumURL1" type="text" formControlName="stratumURL1" formControlName="stratumURL1" />
        <div>
          <small class="light-green-text">'This pool is used on miner bootup'</small>
        </div>
      </div>
    </div>

    <div class="field grid p-fluid">
      <label htmlFor="stratumPassword1" class="col-12 mb-2 md:col-2 md:mb-0">Stratum Password ( Primary ):</label>
      <div class="col-12 md:col-10">
        <input pInputText id="stratumPassword1" formControlName="stratumPassword1" type="password" />
      </div>
    </div>






    <div class="field grid p-fluid">
      <label htmlFor="stratumURL2" class="col-12 mb-2 md:col-2 md:mb-0">Stratum URL ( FallBack ):</label>
      <div class="col-12 md:col-10">
        <input pInputText id="stratumURL2" type="text" formControlName="stratumURL2" formControlName="stratumURL2" />
        <div>
          <small class="light-green-text">'This pool is used when the primary pool fails'</small>
        </div>
      </div>
    </div>

    <div class="field grid p-fluid">
      <label htmlFor="stratumPassword2" class="col-12 mb-2 md:col-2 md:mb-0">Stratum Password ( FallBack ):</label>
      <div class="col-12 md:col-10">
        <input pInputText id="stratumPassword2" formControlName="stratumPassword2" type="password" />
      </div>
    </div>









    <ng-container *ngIf="!devToolsOpen && ASICModel == eASICModel.BM1366">
      <div class="field grid p-fluid">
        <label class="col-12 mb-2 md:col-2 md:mb-0" htmlFor="frequency">OverClock(MHz)</label>
        <div class="col-12 md:col-10">
          <p-dropdown [options]="BM1366DropdownFrequency" optionLabel="name" optionValue="value"
                      formControlName="frequency"></p-dropdown>
        </div>
      </div>


      <div class="field grid p-fluid">
        <label class="col-12 mb-2 md:col-2 md:mb-0" htmlFor="coreVoltage">Vcore(mV)</label>
        <p-dropdown class="col-12 md:col-10" [options]="BM1366CoreVoltage" optionLabel="name"
                    optionValue="value" formControlName="coreVoltage"></p-dropdown>
      </div>

    </ng-container>

    <ng-container *ngIf="!devToolsOpen && ASICModel == eASICModel.BM1368">

      <div class="field grid p-fluid">
        <label class="col-12 mb-2 md:col-2 md:mb-0" htmlFor="frequency">OverClock(MHz)</label>
        <div class="col-12 md:col-10">
          <p-dropdown [options]="BM1368DropdownFrequency" optionLabel="name" optionValue="value"
                      formControlName="frequency"></p-dropdown>
        </div>
      </div>

      <div class="field grid p-fluid">
        <label class="col-12 mb-2 md:col-2 md:mb-0" htmlFor="coreVoltage">Vcore(mV)</label>
        <p-dropdown class="col-12 md:col-10" [options]="BM1368CoreVoltage" optionLabel="name"
                    optionValue="value" formControlName="coreVoltage"></p-dropdown>
      </div>
    </ng-container>

    <ng-container *ngIf="!devToolsOpen && ASICModel == eASICModel.BM1397">

      <div class="field grid p-fluid">
        <label class="col-12 mb-2 md:col-2 md:mb-0" htmlFor="frequency">OverClock(MHz)</label>

        <p-dropdown class="col-12 md:col-10" [options]="BM1397DropdownFrequency" optionLabel="name"
                    optionValue="value" formControlName="frequency"></p-dropdown>

      </div>

      <div class="field grid p-fluid">
        <label class="col-12 mb-2 md:col-2 md:mb-0" htmlFor="coreVoltage">Vcore(mV)</label>
        <p-dropdown class="col-12 md:col-10" [options]="BM1397CoreVoltage" optionLabel="name"
                    optionValue="value" formControlName="coreVoltage"></p-dropdown>
      </div>
    </ng-container>

    <ng-container *ngIf="devToolsOpen === true">

      <div class="field grid p-fluid">
        <label htmlFor="frequency" class="col-12 mb-2 md:col-2 md:mb-0">OverClock(MHz)</label>
        <div class="col-12 md:col-10">
          <input pInputText id="frequency" formControlName="frequency" type="number" />
        </div>
      </div>

      <div class="field grid p-fluid">
        <label htmlFor="coreVoltage" class="col-12 mb-2 md:col-2 md:mb-0">Vcore(mV)</label>
        <div class="col-12 md:col-10">
          <input pInputText id="coreVoltage" formControlName="coreVoltage" type="number" />
        </div>
      </div>

    </ng-container>


    <div class="col-12 md:col-4" *ngIf="form.get('overheat_mode')?.value === 1">
      <div class="field-checkbox">
        <p-checkbox name="overheat_mode" formControlName="overheat_mode" inputId="overheat_mode"
                    [binary]="true"></p-checkbox>
        <label for="overheat_mode">Disable Overheat Mode. Make sure to reset Frequency and Voltage</label>
      </div>
    </div>

    <div class="mt-2">
      <button pButton [disabled]="form.invalid" (click)="updateSystem()"
              class="btn btn-primary mr-2">Save
      </button>
      <b style="line-height: 34px;">You must restart this device after saving for changes to take effect.</b>
    </div>


  </form>
</ng-container>
