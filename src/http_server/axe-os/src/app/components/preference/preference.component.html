<ng-container *ngIf="form != null">
  <form [formGroup]="form">
    <!-- <ng-container *ngIf="!devToolsOpen && ASICModel == eASICModel.BM1366">

    </ng-container> -->

    <!-- Screen Brightness -->
    <div class="field grid p-fluid">
      <label class="col-12 mb-2 md:col-3 md:mb-0" htmlFor="brightness">Screen Brightness</label>
      <div class="col-12 md:col-9">
        <div class="p-grid">
          <div class="p-col-8">
            <p-slider formControlName="brightness" [(ngModel)]="form.controls['brightness'].value"></p-slider>
          </div>
          <div class="p-col-4">
            <label>{{ form.controls['brightness'].value }}%</label>
          </div>
        </div>
      </div>
    </div>

    <!-- Target ASIC Temperature (Auto Fan Mode) -->
    <div *ngIf="form.controls['autofanspeed'].value == true" class="field grid p-fluid">
      <label class="col-12 mb-2 md:col-3 md:mb-0 white-space-nowrap" htmlFor="targetAsicTemp">Target ASIC Temp(°C)</label>
      <div class="col-12 md:col-9">
        <div class="p-grid">
          <div class="p-col-8">
            <p-slider 
              formControlName="targetAsicTemp" 
              [(ngModel)]="form.controls['targetAsicTemp'].value"
              [min]="20" 
              [max]="70"
              [step]="1"
              [ngClass]="getTemperatureSliderClass()">
            </p-slider>
          </div>
          <div class="p-col-4">
            <label>{{ form.controls['targetAsicTemp'].value }}°C</label>
          </div>
        </div>
      </div>
    </div>

    <!-- Fan Speed (Manual Mode) -->
    <div *ngIf="form.controls['autofanspeed'].value != true" class="field grid p-fluid">
      <label class="col-12 mb-2 md:col-3 md:mb-0" htmlFor="fanspeed">Manual Fan Speed
        <b *ngIf="form.controls['fanspeed'].value < 33" style="color:red"></b>
      </label>
      <div class="col-12 md:col-9">
        <div class="p-grid">
          <div class="p-col-8">
            <p-slider formControlName="fanspeed" [(ngModel)]="form.controls['fanspeed'].value"></p-slider>
          </div>
          <div class="p-col-4">
            <label>{{ form.controls['fanspeed'].value }}%</label>
          </div>
        </div>
      </div>
    </div>

    <!-- Checkbox Options -->
    <div class="col-12" style="display: flex; flex-wrap: wrap; gap: 10px;">
      <div class="col-12 md:col-4" style="flex: 1;">
        <div class="field-checkbox">
          <p-checkbox name="flipscreen" formControlName="flipscreen" inputId="flipscreen" [binary]="true"></p-checkbox>
          <label for="flipscreen">Flip Screen</label>
        </div>
      </div>
      <div class="col-12 md:col-4" style="flex: 1;">
        <div class="field-checkbox">
          <p-checkbox name="ledindicator" formControlName="ledindicator" inputId="ledindicator"
                      [binary]="true"></p-checkbox>
          <label for="ledindicator">LED Indicator</label>
        </div>
      </div>
      <div class="col-12 md:col-4" style="flex: 1;">
        <div class="field-checkbox">
          <p-checkbox name="invertfanpolarity" formControlName="invertfanpolarity" inputId="invertfanpolarity"
                      [binary]="true"></p-checkbox>
          <label for="invertfanpolarity">Invert Fan</label>
        </div>
      </div>
      <div class="col-12 md:col-4" style="flex: 1;">
        <div class="field-checkbox">
          <p-checkbox name="autofanspeed" formControlName="autofanspeed" inputId="autofanspeed"
                      [binary]="true"></p-checkbox>
          <label for="autofanspeed">Auto Fan</label>
        </div>
      </div>
      <div class="col-12 md:col-4" style="flex: 1;">
        <div class="field-checkbox">
          <p-checkbox name="autoscreen" formControlName="autoscreen" inputId="autoscreen"
                      [binary]="true"></p-checkbox>
          <label for="autoscreen">Auto Scroll</label>
        </div>
      </div>
    </div>

    <!-- Save Button -->
    <div class="mt-2">
      <button pButton [disabled]="form.invalid" (click)="updateSystem()"
              class="btn btn-primary mr-2">Save
      </button>
      <b style="line-height: 34px;">You must restart this device after saving for changes to take effect.</b>
    </div>
  </form>
</ng-container>
