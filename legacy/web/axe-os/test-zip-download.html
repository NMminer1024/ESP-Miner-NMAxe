<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZIP Download Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-button {
            background: #007bff;
            color: white;
            border: none;
            padding: 15px 25px;
            margin: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .test-button:hover {
            background: #0056b3;
        }
        .logs {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            padding: 15px;
            margin-top: 20px;
            border-radius: 5px;
            height: 400px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
        }
        .progress {
            background: #e9ecef;
            border-radius: 4px;
            height: 20px;
            margin: 10px 0;
            overflow: hidden;
        }
        .progress-bar {
            background: #007bff;
            height: 100%;
            transition: width 0.3s ease;
            line-height: 20px;
            text-align: center;
            color: white;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h1>ZIP Download Function Test</h1>
    <p>This page tests the new ZIP packaging functionality for firmware.bin and spiffs.bin files.</p>
    
    <button class="test-button" onclick="testZipDownload()">Test ZIP Download (firmware.bin + spiffs.bin)</button>
    <button class="test-button" onclick="testSingleDownload()">Test Single File Download</button>
    <button class="test-button" onclick="clearLogs()">Clear Logs</button>
    
    <div class="progress" id="progress" style="display: none;">
        <div class="progress-bar" id="progress-bar" style="width: 0%">0%</div>
    </div>
    
    <div class="logs" id="logs"></div>

    <script>
        function log(message) {
            const logsDiv = document.getElementById('logs');
            const timestamp = new Date().toLocaleTimeString();
            logsDiv.innerHTML += `[${timestamp}] ${message}\n`;
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }

        function showProgress(percent) {
            const progressDiv = document.getElementById('progress');
            const progressBar = document.getElementById('progress-bar');
            progressDiv.style.display = 'block';
            progressBar.style.width = percent + '%';
            progressBar.textContent = Math.round(percent) + '%';
        }

        function hideProgress() {
            document.getElementById('progress').style.display = 'none';
        }

        async function createTarPackage(files, filename) {
            const chunks = [];
            
            for (const file of files) {
                // 创建TAR头部（简化版）
                const header = new Uint8Array(512);
                const nameBytes = new TextEncoder().encode(file.name);
                header.set(nameBytes.slice(0, 100), 0); // 文件名
                
                // 文件大小（8字节，八进制字符串）
                const sizeStr = file.data.byteLength.toString(8).padStart(11, '0') + '\0';
                header.set(new TextEncoder().encode(sizeStr), 124);
                
                // 文件类型（普通文件）
                header[156] = 48; // '0'
                
                // 简单校验和
                let checksum = 0;
                for (let i = 0; i < 512; i++) {
                    if (i >= 148 && i < 156) continue; // 跳过校验和字段
                    checksum += header[i];
                }
                const checksumStr = checksum.toString(8).padStart(6, '0') + '\0 ';
                header.set(new TextEncoder().encode(checksumStr), 148);
                
                chunks.push(header);
                
                // 文件数据
                const dataArray = new Uint8Array(file.data);
                chunks.push(dataArray);
                
                // 填充到512字节边界
                const padding = 512 - (dataArray.length % 512);
                if (padding < 512) {
                    chunks.push(new Uint8Array(padding));
                }
            }
            
            // 添加结束标记（两个空的512字节块）
            chunks.push(new Uint8Array(1024));
            
            return new Blob(chunks, { type: 'application/x-tar' });
        }

        function downloadBlob(blob, filename) {
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            link.style.display = 'none';
            
            document.body.appendChild(link);
            link.click();
            
            setTimeout(() => {
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            }, 100);
        }

        async function testZipDownload() {
            log('=== Testing ZIP Download ===');
            showProgress(0);
            
            try {
                // 模拟下载两个文件
                const assets = [
                    {
                        name: 'firmware.bin',
                        browser_download_url: 'https://github.com/NMminer1024/ESP-Miner-NMAxe/releases/latest/download/firmware.bin'
                    },
                    {
                        name: 'spiffs.bin',
                        browser_download_url: 'https://github.com/NMminer1024/ESP-Miner-NMAxe/releases/latest/download/spiffs.bin'
                    }
                ];

                const files = [];
                
                for (let i = 0; i < assets.length; i++) {
                    const asset = assets[i];
                    log(`Downloading ${asset.name}...`);
                    showProgress((i / assets.length) * 50);
                    
                    try {
                        log(`Fetching: ${asset.browser_download_url}`);
                        const response = await fetch(asset.browser_download_url);
                        log(`Response status: ${response.status} ${response.statusText}`);
                        
                        if (!response.ok) {
                            log(`HTTP Error: ${response.status} - ${response.statusText}`);
                            log(`Response headers: ${JSON.stringify([...response.headers.entries()])}`);
                            throw new Error(`Failed to fetch ${asset.name}: ${response.statusText}`);
                        }
                        
                        const arrayBuffer = await response.arrayBuffer();
                        files.push({
                            name: asset.name,
                            data: arrayBuffer
                        });
                        log(`✓ Downloaded ${asset.name} (${arrayBuffer.byteLength} bytes)`);
                        showProgress(((i + 1) / assets.length) * 50);
                    } catch (error) {
                        log(`✗ Failed to download ${asset.name}: ${error.message}`);
                        log(`Error details: ${error.stack || error}`);
                        
                        // 如果是CORS错误，尝试回退到直接下载
                        if (error.message.includes('CORS') || error.message.includes('fetch')) {
                            log(`CORS or network error detected, falling back to direct download`);
                            downloadFilesSeparately(assets);
                            return;
                        }
                        return;
                    }
                }

                if (files.length === 0) {
                    log('No files downloaded, aborting...');
                    return;
                }

                log(`Creating TAR package with ${files.length} files...`);
                showProgress(75);
                
                const tarBlob = await createTarPackage(files, 'NMAxe-firmware.tar');
                
                log(`TAR package created (${tarBlob.size} bytes)`);
                showProgress(90);
                
                // 下载TAR文件
                downloadBlob(tarBlob, 'NMAxe-firmware.tar');
                
                showProgress(100);
                log('✓ Download completed successfully!');
                
                setTimeout(() => {
                    hideProgress();
                }, 2000);
                
            } catch (error) {
                log(`✗ ZIP download failed: ${error.message}`);
                log(`Error stack: ${error.stack || error}`);
                hideProgress();
                
                // 回退到分别下载
                log('Falling back to separate downloads...');
                const assets = [
                    {
                        name: 'firmware.bin',
                        browser_download_url: 'https://github.com/NMminer1024/ESP-Miner-NMAxe/releases/latest/download/firmware.bin'
                    },
                    {
                        name: 'spiffs.bin',
                        browser_download_url: 'https://github.com/NMminer1024/ESP-Miner-NMAxe/releases/latest/download/spiffs.bin'
                    }
                ];
                downloadFilesSeparately(assets);
            }
        }

        function downloadFilesSeparately(assets) {
            log('=== Starting separate downloads ===');
            assets.forEach((asset, index) => {
                setTimeout(() => {
                    log(`Initiating download for ${asset.name}...`);
                    
                    const link = document.createElement('a');
                    link.href = asset.browser_download_url;
                    link.download = asset.name;
                    link.target = '_blank';
                    link.style.display = 'none';
                    
                    document.body.appendChild(link);
                    link.click();
                    
                    setTimeout(() => {
                        document.body.removeChild(link);
                    }, 100);
                    
                    log(`✓ Download initiated for ${asset.name}`);
                }, index * 2000); // 2秒间隔
            });
            
            setTimeout(() => {
                log('All separate downloads initiated. Check your browser downloads.');
            }, assets.length * 2000 + 1000);
        }

        function testSingleDownload() {
            log('=== Testing Single File Download ===');
            
            const url = 'https://github.com/NMminer1024/ESP-Miner-NMAxe/releases/latest/download/firmware.bin';
            const filename = 'firmware.bin';
            
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            link.target = '_blank';
            link.style.display = 'none';
            
            document.body.appendChild(link);
            link.click();
            
            setTimeout(() => {
                document.body.removeChild(link);
            }, 100);
            
            log(`Single file download initiated: ${filename}`);
        }

        function clearLogs() {
            document.getElementById('logs').innerHTML = '';
            hideProgress();
        }

        // 初始化日志
        log('ZIP download test page loaded. Click buttons to test download functionality.');
        log('Note: The TAR format is used instead of ZIP for simplicity and better browser compatibility.');
    </script>
</body>
</html>
